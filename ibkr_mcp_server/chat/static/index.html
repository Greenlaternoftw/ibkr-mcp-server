<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IBKR">
  <title>IBKR Chat</title>
  <style>
    /* Phone-first dark UI. No framework, no build step. */
    :root {
      --bg: #0f172a;
      --bg-elevated: #1e293b;
      --bg-input: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --accent: #38bdf8;
      --user-bg: #1e3a8a;
      --user-text: #dbeafe;
      --assistant-bg: #1e293b;
      --assistant-text: #e2e8f0;
      --tool-bg: #134e4a;
      --tool-text: #a7f3d0;
      --error-bg: #7f1d1d;
      --error-text: #fecaca;
      --code-bg: #0b1120;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --bg-elevated: #ffffff;
        --bg-input: #ffffff;
        --border: #cbd5e1;
        --text: #0f172a;
        --text-dim: #475569;
        --accent: #0284c7;
        --user-bg: #dbeafe;
        --user-text: #1e3a8a;
        --assistant-bg: #ffffff;
        --assistant-text: #0f172a;
        --tool-bg: #d1fae5;
        --tool-text: #064e3b;
        --error-bg: #fee2e2;
        --error-text: #7f1d1d;
        --code-bg: #f1f5f9;
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      font-size: 16px;
      overscroll-behavior-y: none;
    }
    body {
      display: flex; flex-direction: column;
      height: 100vh; height: 100dvh;
    }
    header {
      flex: 0 0 auto;
      padding: env(safe-area-inset-top, 12px) 16px 12px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }
    header h1 {
      margin: 0; font-size: 16px; font-weight: 600;
      letter-spacing: 0.02em;
    }
    .status {
      font-size: 11px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .status.ok { color: #10b981; }
    .status.err { color: #f87171; }
    .header-actions { display: flex; gap: 8px; }
    .header-actions button {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .header-actions button:active { background: var(--bg); }

    #thread {
      flex: 1 1 auto; overflow-y: auto;
      padding: 12px;
      display: flex; flex-direction: column; gap: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .msg {
      max-width: 88%;
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.45;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg.user {
      background: var(--user-bg);
      color: var(--user-text);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      background: var(--assistant-bg);
      color: var(--assistant-text);
      align-self: flex-start;
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg.tool {
      background: var(--tool-bg);
      color: var(--tool-text);
      align-self: flex-start;
      max-width: 95%;
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", monospace;
      font-size: 12px;
      border-radius: 8px;
    }
    .msg.error {
      background: var(--error-bg);
      color: var(--error-text);
      align-self: stretch;
      max-width: 100%;
    }
    .msg.thinking {
      align-self: flex-start;
      color: var(--text-dim);
      font-style: italic;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .msg pre, .msg code {
      background: var(--code-bg);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", monospace;
      font-size: 13px;
    }
    .msg pre {
      padding: 8px 10px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    form {
      flex: 0 0 auto;
      display: flex; gap: 8px;
      padding: 10px 12px env(safe-area-inset-bottom, 14px);
      background: var(--bg-elevated);
      border-top: 1px solid var(--border);
    }
    textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-input);
      color: var(--text);
      font-size: 16px;  /* >= 16px stops iOS auto-zoom on focus */
      font-family: inherit;
      padding: 10px 12px;
      max-height: 120px;
      min-height: 40px;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    button[type="submit"] {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      min-width: 64px;
    }
    button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>IBKR Chat</h1>
      <div id="status" class="status">connecting...</div>
    </div>
    <div class="header-actions">
      <button id="reset" type="button" title="Start a new thread">New</button>
    </div>
  </header>

  <main id="thread" aria-live="polite"></main>

  <form id="form" autocomplete="off">
    <textarea id="input" placeholder="Ask anything..." rows="1" required></textarea>
    <button type="submit" id="send">Send</button>
  </form>

  <script>
  // -------- bearer token bootstrap --------
  // The chat page is fetched with a bearer header (the user's browser
  // doesn't have one natively). To make this work without an OAuth flow,
  // we accept the token either:
  //   (a) embedded in the URL as ?token=<...> on first load -- saved to
  //       localStorage on success and stripped from the URL,
  //   (b) entered in a prompt if not present.
  // Future improvement: a real login form. Phase 1 is operator-only.
  const STORAGE_KEY_TOKEN = 'ibkr-chat-token';
  const STORAGE_KEY_THREAD = 'ibkr-chat-thread';

  function getStoredToken() {
    return localStorage.getItem(STORAGE_KEY_TOKEN) || '';
  }
  function saveToken(t) {
    if (t) localStorage.setItem(STORAGE_KEY_TOKEN, t);
  }
  function clearToken() { localStorage.removeItem(STORAGE_KEY_TOKEN); }

  // Bootstrap: grab from URL if present.
  (function bootstrapToken() {
    const url = new URL(window.location.href);
    const fromQuery = url.searchParams.get('token');
    if (fromQuery) {
      saveToken(fromQuery);
      url.searchParams.delete('token');
      window.history.replaceState({}, '', url.toString());
    }
    if (!getStoredToken()) {
      const entered = window.prompt(
        'Enter your MCP_AUTH_TOKEN to access this chat.\n' +
        'Tip: append ?token=<your-token> to the URL to save it once.'
      );
      if (entered) saveToken(entered.trim());
    }
  })();

  function authHeaders() {
    const t = getStoredToken();
    return t ? { 'Authorization': 'Bearer ' + t } : {};
  }

  // -------- thread state --------
  // Conversation lives in localStorage so refresh doesn't lose context.
  // Trimmed to last N messages to keep token cost bounded.
  let conversation = JSON.parse(localStorage.getItem(STORAGE_KEY_THREAD) || '[]');

  function persistThread() {
    // Keep the last ~30 messages (assistant tool-use threads can balloon).
    if (conversation.length > 30) {
      conversation = conversation.slice(-30);
    }
    localStorage.setItem(STORAGE_KEY_THREAD, JSON.stringify(conversation));
  }

  function clearThread() {
    conversation = [];
    persistThread();
    document.getElementById('thread').innerHTML = '';
  }

  // -------- rendering --------
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  // Very small markdown subset -- enough for the kinds of replies the
  // agent produces. We do NOT pull in a full markdown lib for Phase 1.
  function renderMarkdown(text) {
    let html = escapeHtml(text);
    // Code blocks ```...```
    html = html.replace(/```([\s\S]*?)```/g, (_m, code) =>
      '<pre>' + code.replace(/^\n/, '') + '</pre>');
    // Inline code `...`
    html = html.replace(/`([^`\n]+?)`/g, '<code>$1</code>');
    // Bold **...**
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    return html;
  }

  function appendMessage(role, text, klass) {
    const thread = document.getElementById('thread');
    const div = document.createElement('div');
    div.className = 'msg ' + (klass || role);
    div.innerHTML = renderMarkdown(text);
    thread.appendChild(div);
    thread.scrollTop = thread.scrollHeight;
    return div;
  }

  // Render an entire conversation from storage on page load.
  function rerender() {
    const thread = document.getElementById('thread');
    thread.innerHTML = '';
    for (const msg of conversation) {
      if (msg.role === 'user') {
        // Content may be string OR array of blocks (after tool_result turn).
        if (typeof msg.content === 'string') {
          appendMessage('user', msg.content);
        }
        // tool_result content is hidden in the UI (it's the model's input,
        // not something the user wrote). The associated tool_use will
        // already have rendered as the "calling tool..." line above.
      } else if (msg.role === 'assistant') {
        for (const block of (msg.content || [])) {
          if (block.type === 'text' && block.text) {
            appendMessage('assistant', block.text);
          } else if (block.type === 'tool_use') {
            const args = JSON.stringify(block.input || {}, null, 0);
            appendMessage('tool', '🔧 ' + block.name + ': ' + args, 'tool');
          }
        }
      }
    }
  }

  // -------- status indicator --------
  async function refreshStatus() {
    const status = document.getElementById('status');
    try {
      const r = await fetch('/chat/api/health', { headers: authHeaders() });
      if (r.status === 401) {
        status.textContent = 'auth failed';
        status.className = 'status err';
        return;
      }
      const j = await r.json();
      if (!j.chat_enabled) {
        status.textContent = 'chat disabled';
        status.className = 'status err';
      } else if (!j.has_api_key) {
        status.textContent = 'no api key';
        status.className = 'status err';
      } else {
        status.textContent = j.model + ' • ' + j.tool_count + ' tools';
        status.className = 'status ok';
      }
    } catch (e) {
      status.textContent = 'offline';
      status.className = 'status err';
    }
  }

  // -------- sending --------
  async function send(text) {
    const sendBtn = document.getElementById('send');
    const input = document.getElementById('input');
    sendBtn.disabled = true; input.disabled = true;

    conversation.push({ role: 'user', content: text });
    appendMessage('user', text);
    persistThread();

    const thinking = appendMessage('assistant', '…thinking', 'thinking');

    try {
      const r = await fetch('/chat/api/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ messages: conversation }),
      });
      thinking.remove();

      if (!r.ok) {
        const errBody = await r.json().catch(() => ({ error: 'unknown' }));
        appendMessage('assistant', '❌ ' + (errBody.error || ('HTTP ' + r.status)), 'error');
        // Drop the user message back so it can be retried.
        conversation.pop();
        persistThread();
        return;
      }

      const j = await r.json();
      conversation = j.conversation;
      persistThread();

      // Render only the new assistant turn (last message in convo).
      const lastAssistant = conversation[conversation.length - 1];
      if (lastAssistant && lastAssistant.role === 'assistant') {
        for (const block of (lastAssistant.content || [])) {
          if (block.type === 'text' && block.text) {
            appendMessage('assistant', block.text);
          } else if (block.type === 'tool_use') {
            // shouldn't appear on a final turn but render defensively
            appendMessage('tool', '🔧 ' + block.name, 'tool');
          }
        }
      }

      // Also surface tool_use calls from intermediate iterations -- they
      // get persisted into the conversation by the server.
      // (We re-render to show the full new state cleanly.)
      rerender();
    } catch (e) {
      thinking.remove();
      appendMessage('assistant', '❌ ' + e.message, 'error');
      conversation.pop();
      persistThread();
    } finally {
      sendBtn.disabled = false; input.disabled = false;
      input.focus();
    }
  }

  // -------- wiring --------
  document.getElementById('form').addEventListener('submit', (e) => {
    e.preventDefault();
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = '';
    send(text);
  });

  // Auto-grow textarea
  const ta = document.getElementById('input');
  ta.addEventListener('input', () => {
    ta.style.height = '';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });

  // Enter to send, Shift+Enter for newline.
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('form').dispatchEvent(new Event('submit'));
    }
  });

  document.getElementById('reset').addEventListener('click', () => {
    if (confirm('Clear conversation? (token stays saved)')) clearThread();
  });

  rerender();
  refreshStatus();
  </script>
</body>
</html>
