services:
  ib-gateway:
    # IB Gateway (headless). The "live mode disconnects every 5 min" saga
    # of 2026-06-04/05 turned out NOT to be a Gateway or IBKR problem at
    # all — it was our own watchdog (scripts/ibkr-watchdog.sh) hardcoded to
    # check the paper port 4002, restarting a perfectly-healthy live Gateway
    # every 5 minutes. Fixed in that script (port now derives from
    # IBKR_PORT). Gateway-on-4001-from-VPS is stable; no TWS image or IP
    # workaround needed.
    #
    # Ports: 4001 (live) / 4002 (paper). Set IBKR_PORT in your .env to match.
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ib-gateway
    restart: unless-stopped
    # Host networking so Gateway sees connections as coming from 127.0.0.1
    # (which is what its TrustedIPs=127.0.0.1 config allows). The same
    # arrangement we settled on for the Layer 1 verification.
    network_mode: host
    env_file: ../.env
    environment:
      # Set TRADING_MODE in your .env. Use "paper" for DU* accounts and
      # "live" for U* accounts. Live mode also requires the live-account
      # TWS_USERID + TWS_PASSWORD in .env (those load via env_file above).
      # Set IBKR_PORT in your .env to 4001 (live) or 4002 (paper).
      TRADING_MODE: ${TRADING_MODE:-paper}
      READ_ONLY_API: "no"
      TWS_ACCEPT_INCOMING: accept
      TIME_ZONE: America/New_York
      # Java reads TZ separately from TIME_ZONE; set both so timestamps in
      # jts.ini stay consistent with daemon logs.
      TZ: America/New_York
      AUTO_RESTART_TIME: "11:59 PM"

      # ------------------------------------------------------------------
      # Live-mode hardening — researched and verified 2026-06-04 after a
      # multi-hour debug against a live account. No-op on paper but
      # required on live. Do NOT remove these in a "simplification" pass.
      # ------------------------------------------------------------------

      # IBC config: relogin after 2FA timeout. Note the var name is
      # TWOFA (no digit) — the older RELOGIN_AFTER_2FA_TIMEOUT (with the
      # digit) is silently ignored by the gnzsnz image.
      RELOGIN_AFTER_TWOFA_TIMEOUT: "yes"

      # If 2FA times out, restart IBC (which re-pushes the 2FA prompt)
      # instead of exiting the container.
      TWOFA_TIMEOUT_ACTION: restart

      # CRITICAL for live: how IBKR's session arbiter resolves conflicts
      # when another active session (IBKR Mobile installed for 2FA,
      # Client Portal browser tab, TWS Desktop, another Gateway) exists
      # for the same username.
      #   - "primary"         → this Gateway refuses to yield, BUT a
      #                          competing primary session WINS the
      #                          arbitration, kicking us. Symptom:
      #                          Gateway logs in, dies in 30-60s, IBC
      #                          re-logins, repeat forever.
      #   - "primaryoverride" → this Gateway forcefully TAKES OVER.
      #                          IBC user guide explicitly recommends
      #                          this "if using the IBKR Mobile app or
      #                          the Client Portal on the IBKR Account
      #                          Management page causes your TWS/Gateway
      #                          session to be shut down."
      # The gnzsnz .env-dist default of "primary" is WRONG for any
      # account where the operator has IBKR Mobile installed or ever
      # visits Client Portal in a browser (i.e. essentially every
      # real-world account).
      EXISTING_SESSION_DETECTED_ACTION: primaryoverride

      # Suppress the "API client needs write access action confirmation"
      # dialog that pops up on the first live API connection. Without
      # this, IBC may fail to dismiss the dialog and the API listener
      # hangs.
      ALLOW_BLIND_TRADING: "yes"

      # IBC's master client ID. Daemon connects with clientId=1 (its
      # default). They MUST differ — using clientId=1 as the master
      # while the daemon also uses 1 caused mysterious disconnects in
      # debugging.
      TWS_MASTER_CLIENT_ID: "100"

      BYPASS_WARNING: "yes"
      # ------------------------------------------------------------------

    # File-descriptor exhaustion was a documented cause of mid-day
    # Gateway container restarts (gnzsnz Discussion #245). Default Docker
    # ulimit is ~1024 which the JVM + jxbrowser internals can exhaust.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  ibkr-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp
    container_name: ibkr-mcp
    restart: unless-stopped
    depends_on:
      - ib-gateway
    # Also host networking — the daemon needs to reach 127.0.0.1:4001
    # (live) or 127.0.0.1:4002 (paper) on the same loopback Gateway is
    # bound to. This also publishes the MCP HTTP port directly on the
    # host's 127.0.0.1:8765 (assuming MCP_BIND_HOST is 127.0.0.1 in
    # .env, which it should be for SSH-tunnel access).
    network_mode: host
    env_file:
      - ../.env
    volumes:
      # Persist the per-strategy JSON state files across container restarts.
      - mcp-state:/home/trader
    # The Dockerfile sets ENTRYPOINT=["python", "-m", "ibkr_mcp_server"];
    # compose's `command` appends to it, so we list only the CLI flags
    # here. Wait long enough for Gateway to finish logging in before we
    # try to connect; the healthcheck handles steady-state restarts.
    command: ["--daemon", "--transport", "http"]

volumes:
  mcp-state:
    name: ibkr-mcp-state
